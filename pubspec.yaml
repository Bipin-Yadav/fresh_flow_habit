name: fresh_flow_habit
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.1.0
  lucide_icons: ^0.257.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_native_splash: ^2.3.4
  flutter_slidable: ^4.0.1
  share_plus: ^11.1.0
  image_picker: ^1.2.0
  path_provider: ^2.1.5
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0



flutter:
  uses-material-design: true
  assets:
    - assets/splash_bg.png
    - assets/invite_image.png

flutter_native_splash:
  color: "#16C9E6"       # fallback background color (behind your image)
  image: assets/splash_bg.png
  android: true
  ios: true
  web: true


